<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Get Involved – Donate, Sponsor a Child, School Kit | Sri Takshashila Gurukul" />
  <title>Get Involved | Sri Takshashila Gurukul</title>
  <link rel="icon" href="Assests/Logo.png" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config = { theme: { extend: { colors: { primary: '#001e8c', accent: '#df5030' } } } };</script>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body class="font-sans antialiased text-gray-800 bg-white">
  <div id="site-header"></div>

  <!-- Page hero -->
  <section class="relative py-16 md:py-24 bg-gradient-to-br from-primary/95 to-primary text-white overflow-hidden">
    <div class="absolute inset-0 bg-[url('Assests/carousel_5.jpeg')] bg-cover bg-center opacity-20"></div>
    <div class="relative max-w-7xl mx-auto px-4 sm:px-6 text-center">
      <span class="inline-block text-white/90 text-sm font-semibold uppercase tracking-widest mb-3">Support us</span>
      <h1 class="text-4xl md:text-5xl lg:text-6xl font-bold mb-4">Donate</h1>
      <p class="text-xl md:text-2xl text-white/90 max-w-3xl mx-auto">Together we can see our grand vision come true—a world where every bright student has access to quality education and caring mentorship.</p>
    </div>
  </section>

  <main class="max-w-5xl mx-auto px-4 py-16">
    <div class="grid sm:grid-cols-2 gap-8">
      <a href="coming-soon.html" class="block bg-white rounded-2xl p-8 shadow-lg hover:shadow-xl transition text-center">
        <div class="w-28 h-28 rounded-full bg-primary/10 mx-auto mb-4 flex items-center justify-center text-5xl text-primary"><i class="fa-solid fa-child"></i></div>
        <h2 class="text-xl font-bold text-primary">Sponsor a Child</h2>
      </a>
      <a href="coming-soon.html" class="block bg-white rounded-2xl p-8 shadow-lg hover:shadow-xl transition text-center">
        <img src="Assests/School_kit.png" alt="Sponsor a school kit" class="w-28 h-28 object-contain mx-auto mb-4" onerror="this.onerror=null; this.src='Assests/No_Image.png';" />
        <h2 class="text-xl font-bold text-primary"><i class="fa-solid fa-briefcase mr-2"></i>Sponsor a School Kit</h2>
      </a>
      <a href="coming-soon.html" class="block bg-white rounded-2xl p-8 shadow-lg hover:shadow-xl transition text-center">
        <img src="Assests/books.png" alt="Books and study materials" class="w-32 h-32 object-contain mx-auto mb-4" />
        <h2 class="text-xl font-bold text-primary"><i class="fa-solid fa-book mr-2"></i>Sponsor Books &amp; Study Materials</h2>
      </a>
      <a href="coming-soon.html" class="block bg-white rounded-2xl p-8 shadow-lg hover:shadow-xl transition text-center">
        <img src="Assests/Give_money.png" alt="Way to give" class="w-32 h-32 object-contain mx-auto mb-4" />
        <h2 class="text-xl font-bold text-primary"><i class="fa-solid fa-indian-rupee-sign mr-2"></i>Way to Give (Money)</h2>
      </a>
    </div>
  </main>

  <div id="site-footer"></div>

  <script src="includes/load-header-footer.js"></script>
</body>
</html>
