<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Thank You</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      font-family: Arial, Helvetica, sans-serif;
      background: #ffffff;
      color: #111111;
    }

    .thank-you-section {
      width: 100%;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 20px;
    }

    .thank-you-box {
      max-width: 900px;
      width: 100%;
    }

    .thank-you-box h1 {
      font-size: 42px;
      font-weight: 700;
      margin-bottom: 12px;
      letter-spacing: -0.5px;
    }

    .thank-you-box p {
      font-size: 14px;
      line-height: 1.5;
      color: #222222;
      font-weight: 400;
    }

    @media (max-width: 768px) {
      .thank-you-box h1 {
        font-size: 30px;
      }

      .thank-you-box p {
        font-size: 13px;
      }
    }
  </style>
</head>

<body>
  <section class="thank-you-section">
    <div class="thank-you-box">
      <h1>Thank you for your generous donation!</h1>
      <p>
        If you have any questions, please write to us at info@vds.in.
        Please check your email to access your donation<br>
        history.
      </p>
    </div>
  </section>
</body>
</html>
