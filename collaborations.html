<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="CSR Collaborations – Sri Takshashila Gurukul" />
  <title>CSR Collaborations | Sri Takshashila Gurukul</title>
  <link rel="icon" href="Assests/Logo.png" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config = { theme: { extend: { colors: { primary: '#001e8c' } } } };</script>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body class="font-sans antialiased text-gray-800 bg-white">
  <div id="site-header"></div>

  <!-- Page hero -->
  <section class="relative py-16 md:py-24 bg-gradient-to-br from-primary/95 to-primary text-white overflow-hidden">
    <div class="absolute inset-0 bg-[url('Assests/carousel_5.jpeg')] bg-cover bg-center opacity-20"></div>
    <div class="relative max-w-7xl mx-auto px-4 sm:px-6 text-center">
      <span class="inline-block text-white/90 text-sm font-semibold uppercase tracking-widest mb-3">Partners</span>
      <h1 class="text-4xl md:text-5xl lg:text-6xl font-bold mb-4">CSR &amp; Collaborations</h1>
      <p class="text-xl md:text-2xl text-white/90 max-w-3xl mx-auto">We thank our partners and collaborators for their support.</p>
    </div>
  </section>

  <main class="max-w-6xl mx-auto px-4 py-16">
    <div class="grid grid-cols-2 md:grid-cols-3 gap-8">
      <div class="bg-white rounded-2xl p-6 shadow-lg flex flex-col items-center justify-center min-h-[180px]">
        <img src="Assests/keitherns.png" alt="Kietherns" class="max-h-16 w-auto object-contain mb-3" onerror="this.style.display='none'" />
        <span class="font-semibold text-gray-900">Kietherns</span>
      </div>
      <div class="bg-white rounded-2xl p-6 shadow-lg flex flex-col items-center justify-center min-h-[180px]">
        <img src="Assests/Arnima.png" alt="Arnima" class="max-h-16 w-auto object-contain mb-3" onerror="this.style.display='none'" />
        <span class="font-semibold text-gray-900">Arnima</span>
      </div>
      <div class="bg-white rounded-2xl p-6 shadow-lg flex flex-col items-center justify-center min-h-[180px]">
        <img src="Assests/PureIndiaTrust.png" alt="Pure India Trust" class="max-h-16 w-auto object-contain mb-3" onerror="this.style.display='none'" />
        <span class="font-semibold text-gray-900">Pure India Trust</span>
      </div>
      <div class="bg-white rounded-2xl p-6 shadow-lg flex flex-col items-center justify-center min-h-[180px]">
        <img src="Assests/LionsClub.jpg" alt="Lions Club" class="max-h-16 w-auto object-contain mb-3" onerror="this.style.display='none'" />
        <span class="font-semibold text-gray-900">Lions Club</span>
      </div>
      <div class="bg-white rounded-2xl p-6 shadow-lg flex flex-col items-center justify-center min-h-[180px]">
        <img src="Assests/WeReach.jpg" alt="WeReach" class="max-h-16 w-auto object-contain mb-3" onerror="this.style.display='none'" />
        <span class="font-semibold text-gray-900">WeReach</span>
      </div>
      <div class="bg-white rounded-2xl p-6 shadow-lg flex flex-col items-center justify-center min-h-[180px]">
        <img src="Assests/BookMyPooja.png" alt="BookMyPooja" class="max-h-16 w-auto object-contain mb-3" onerror="this.style.display='none'" />
        <span class="font-semibold text-gray-900">BookMyPooja</span>
      </div>
      <div class="bg-white rounded-2xl p-6 shadow-lg flex flex-col items-center justify-center min-h-[180px] md:col-span-2 md:col-start-2">
        <img src="Assests/Ennovi.png" alt="ENNOVI" class="max-h-16 w-auto object-contain mb-3" onerror="this.style.display='none'" />
        <span class="font-semibold text-gray-900">ENNOVI</span>
      </div>
    </div>
  </main>

  <div id="site-footer"></div>

  <script src="includes/load-header-footer.js"></script>
</body>
</html>
